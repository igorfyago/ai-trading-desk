# The full desk in production: the REAL options-flow-analytics pipeline
# (Rust collector -> Postgres -> Node API/dashboard) running 24/7, and the
# AI agents (ai-trading-desk web) reading the SAME live Postgres.
#
# Layout on the host (EC2): both repos cloned side by side ·
#   ~/apps/options-flow-analytics
#   ~/apps/ai-trading-desk        <- run compose from this repo's deploy/
#
#   cd ~/apps/ai-trading-desk/deploy
#   cp .env.example .env          # fill OPENAI_API_KEY etc. (or pull from SSM)
#   docker compose -f docker-compose.aws.yml up -d --build

name: trading-desk

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: options
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: options
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../options-flow-analytics/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U options"]
      interval: 10s
      retries: 5

  collector:
    build:
      context: ../../options-flow-analytics
      dockerfile: collector/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://options:${POSTGRES_PASSWORD}@postgres:5432/options
      # IWM joined 2026-07-20: the desk's covered-tickers strings said
      # SPY/QQQ/IWM while the DB had zero IWM rows - the claim and the
      # collector now agree
      TICKERS: ${TICKERS:-SPY,QQQ,IWM}
      INTERVAL_SECS: ${INTERVAL_SECS:-30}
      PROVIDER: ${PROVIDER:-cboe}          # real delayed market data, no key needed
      RETENTION_DAYS: ${RETENTION_DAYS:-30}

  gex-api:
    build:
      context: ../../options-flow-analytics
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://options:${POSTGRES_PASSWORD}@postgres:5432/options
    ports:
      - "127.0.0.1:3000:3000"              # GEX dashboard (proxied by caddy)

  desk:
    build: ..
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set in .env}
      XAI_API_KEY: ${XAI_API_KEY:-}
      TV_WEBHOOK_TOKEN: ${TV_WEBHOOK_TOKEN:-}
      OPENAI_WEBHOOK_SECRET: ${OPENAI_WEBHOOK_SECRET:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-ai-trading-desk-prod}
      # live quotes feed: real-time IEX with Alpaca keys, labeled keyless
      # fallbacks without (yahoo -> cboe 15m -> DB snapshot)
      ALPACA_KEY_ID: ${ALPACA_KEY_ID:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      WATCH_SYMBOLS: ${WATCH_SYMBOLS:-SPY,QQQ,IWM}
      # every trade decision runs through the LangGraph desk brain and the
      # run record ships to the observatory next door - same box, docker
      # network, but the token still gates it because obs is public
      OBS_INGEST_URL: ${OBS_INGEST_URL:-http://observatory:8321/api/desk/runs}
      OBS_INGEST_TOKEN: ${OBS_INGEST_TOKEN:-}
      X_LIST_HANDLES: ${X_LIST_HANDLES:-}
      # the agents query the LIVE dealer-positioning DB, not the demo SQLite:
      DATABASE_URL: postgres://options:${POSTGRES_PASSWORD}@postgres:5432/options
    volumes:
      - deskdata:/app/data                 # trades log, quote cache and TA
                                           # signals survive rebuilds
    ports:
      - "127.0.0.1:8000:8000"              # agents app (proxied by caddy)

  observatory:
    build: ../../agent-observatory        # clone side-by-side like options-flow
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set in .env}
      OPENAI_MODEL: ${OBSERVATORY_MODEL:-gpt-4o-mini}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_PROJECT: agent-observatory
      # it is publicly reachable and runs on one personal key, so it meters
      # itself and stops rather than surprising anyone with a bill
      OBS_DAILY_USD: ${OBS_DAILY_USD:-2.00}
      OBS_MONTHLY_USD: ${OBS_MONTHLY_USD:-20.00}
      OBS_COOLDOWN_S: ${OBS_COOLDOWN_S:-20}
      OBS_MAX_CONCURRENT: ${OBS_MAX_CONCURRENT:-3}
      # unset = the desk-run ingest endpoint rejects everything (fail closed)
      OBS_INGEST_TOKEN: ${OBS_INGEST_TOKEN:-}
      OBS_SES_FROM: ${OBS_SES_FROM:-}      # unset = alerts degrade to log lines
      # the SES identity lives in eu-west-2 while the box is us-east-1, so the
      # alert region is pinned explicitly rather than inherited from AWS_REGION
      OBS_SES_REGION: ${OBS_SES_REGION:-eu-west-2}
      OBS_ALERT_TO: ${OBS_ALERT_TO:-igor.yago@gmail.com}
      AWS_REGION: ${AWS_REGION:-us-east-1}   # the box and the account both live here
    volumes:
      - obsdata:/app/data                  # the spend meter must survive a
                                           # rebuild, or every deploy is a
                                           # fresh budget
    ports:
      - "127.0.0.1:8321:8321"             # live agent-DAG demo (proxied by caddy)

  # ---------------------------------------------------------------- minibank
  # The raw-Java neobank (clone side-by-side: /opt/apps/minibank). Five
  # containers: the app, two REGION databases (eu/uk), a control-plane
  # database (directory + notifications), and Kafka. Heaps are capped ·
  # this instance is small and the bank is polite.
  minibank-shard0:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: minibank
      POSTGRES_PASSWORD: minibank     # never published to the host; internal network only
      POSTGRES_DB: minibank
    volumes:
      - bank_shard0:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minibank"]
      interval: 10s
      retries: 5

  minibank-shard1:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: minibank
      POSTGRES_PASSWORD: minibank
      POSTGRES_DB: minibank
    volumes:
      - bank_shard1:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minibank"]
      interval: 10s
      retries: 5

  minibank-control:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: minibank
      POSTGRES_PASSWORD: minibank
      POSTGRES_DB: minibank
    volumes:
      - bank_control:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minibank"]
      interval: 10s
      retries: 5

  minibank-kafka:
    image: apache/kafka:3.8.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@minibank-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://minibank-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"

  minibank:
    build:
      # THE CONTEXT IS THE REPO ROOT, not the module. ledger-service now
      # depends on the in-repo sso-client, which is published to no
      # registry, so the build has to be able to see a sibling directory.
      context: ../../minibank
      dockerfile: ledger-service/Dockerfile
    restart: unless-stopped
    depends_on:
      minibank-shard0:
        condition: service_healthy
      minibank-shard1:
        condition: service_healthy
      minibank-control:
        condition: service_healthy
      minibank-kafka:
        condition: service_started
      minibank-redis:
        condition: service_started
    environment:
      MINIBANK_SHARD0_URL: jdbc:postgresql://minibank-shard0:5432/minibank
      MINIBANK_SHARD1_URL: jdbc:postgresql://minibank-shard1:5432/minibank
      MINIBANK_DB_URL: jdbc:postgresql://minibank-control:5432/minibank
      MINIBANK_KAFKA: minibank-kafka:9092
      MINIBANK_POOL: "10"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}     # Rita, the support agent (read-only, metered)
      FX_URL: http://minibank-fx:8090         # the FX microservice · its own container
      BROKER_URL: http://minibank-broker:8091 # where orders go · without this BrokerClient falls back to localhost:8091 (itself) and every trade fizzles
      REDIS_URL: redis://minibank-redis:6379  # read-through cache for prices/market data
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    ports:
      - "127.0.0.1:8085:8080"             # debugging only; caddy proxies internally

  minibank-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "32mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]

  minibank-fx:
    build:
      # THE CONTEXT IS THE REPO ROOT, not the module. ledger-service now
      # depends on the in-repo sso-client, which is published to no
      # registry, so the build has to be able to see a sibling directory.
      context: ../../minibank
      dockerfile: ledger-service/Dockerfile
    restart: unless-stopped
    entrypoint: ["java", "-cp", "classes:deps/*", "dev.minibank.fx.FxService"]
    environment:
      FX_PORT: "8090"
      JAVA_TOOL_OPTIONS: "-Xmx48m"

  # ---- the broker: orders, fills, cost basis and the watchlist.
  # Same image, different entrypoint, its own database (minibank_broker on
  # the control-plane Postgres) and its own Kafka groups. The bank settles
  # its fills over the 'orders' and 'settlements' topics.
  #
  # It is given no shard address, deliberately: the boundary between this
  # service and the ledger is the absence of a connection string, not a
  # convention someone has to remember.
  #
  # BROKER_VENUE stays 'simulated'. The venue port has a real-broker seam,
  # and pointing it at one is a decision somebody makes on purpose, never a
  # side effect of deploying.
  minibank-broker:
    build:
      # THE CONTEXT IS THE REPO ROOT, not the module. ledger-service now
      # depends on the in-repo sso-client, which is published to no
      # registry, so the build has to be able to see a sibling directory.
      context: ../../minibank
      dockerfile: ledger-service/Dockerfile
    restart: unless-stopped
    entrypoint: ["java", "-cp", "classes:deps/*", "dev.minibank.broker.BrokerService"]
    depends_on:
      minibank-control:
        condition: service_healthy
      minibank-shard0:
        condition: service_healthy
      minibank-shard1:
        condition: service_healthy
      minibank-kafka:
        condition: service_started
    environment:
      BROKER_PORT: "8091"
      BROKER_VENUE: simulated
      MINIBANK_DB_URL: jdbc:postgresql://minibank-control:5432/minibank
      # The broker holds BOTH books open to reconcile them: its own positions
      # and the ledger's asset accounts, one per region. Without these it fell
      # back to the dev default of localhost:5434 and reported
      # "reconciliation and backfill unavailable" · which is the honest
      # failure, but it means the audit never runs and the drift never heals.
      MINIBANK_SHARD0_URL: jdbc:postgresql://minibank-shard0:5432/minibank
      MINIBANK_SHARD1_URL: jdbc:postgresql://minibank-shard1:5432/minibank
      MINIBANK_KAFKA: minibank-kafka:9092
      FX_URL: http://minibank-fx:8090
      JAVA_TOOL_OPTIONS: "-Xmx96m"

  # ---- minimart + minipay: a shop with a simulated economy, and its processor
  minimart:
    build: ../../minimart
    restart: unless-stopped
    depends_on:
      minibank-control:
        condition: service_healthy
    environment:
      # all three databases live on the existing control-plane Postgres: a
      # server hosting several databases is exactly what a database server is
      # for, and this box has RAM to respect. They share a server and nothing
      # else, so moving one onto its own is a change of URL.
      MINIMART_ADMIN_URL: jdbc:postgresql://minibank-control:5432/minibank
      MINIMART_DB_URL: jdbc:postgresql://minibank-control:5432/minimart
      MINIMART_DB_USER: minibank
      MINIMART_DB_PASSWORD: minibank
      MINIPAY_ADMIN_URL: jdbc:postgresql://minibank-control:5432/minibank
      MINIPAY_DB_URL: jdbc:postgresql://minibank-control:5432/minipay
      MINIPAY_DB_USER: minibank
      MINIPAY_DB_PASSWORD: minibank
      # the third service: reporting, which owns no goods and no money and
      # learns everything it knows from the event stream
      ANALYTICS_ADMIN_URL: jdbc:postgresql://minibank-control:5432/minibank
      ANALYTICS_DB_URL: jdbc:postgresql://minibank-control:5432/minimart_analytics
      ANALYTICS_DB_USER: minibank
      ANALYTICS_DB_PASSWORD: minibank
      # the fourth service: freight, whose FreightDb defaults to the dev
      # compose Postgres on localhost:5436 and crash-loops the whole JVM in
      # prod without these (mart+pay outage 2026-07-20)
      MINIFREIGHT_ADMIN_URL: jdbc:postgresql://minibank-control:5432/minibank
      MINIFREIGHT_DB_URL: jdbc:postgresql://minibank-control:5432/minifreight
      MINIFREIGHT_DB_USER: minibank
      MINIFREIGHT_DB_PASSWORD: minibank
      MINIPAY_URL: http://localhost:8082
      # The processor reaches the affiliated bank's ISSUER face over HTTP, on
      # the container network, exactly as it would reach a stranger's. On-us
      # means skipping the card network, never skipping the boundary.
      MINIBANK_ISSUER_URL: http://minibank:8080
      # the broker minibank already runs. A second topic on an existing cluster
      # is what a broker is for, and the outbox means a broker that is down
      # costs lag rather than orders.
      MINIMART_KAFKA: minibank-kafka:9092
      MINIMART_POOL: "8"
      MINIPAY_POOL: "8"
      ANALYTICS_POOL: "4"
      MINIFREIGHT_POOL: "4"
      JAVA_TOOL_OPTIONS: "-Xmx320m"
    ports:
      - "127.0.0.1:8086:8081"
      - "127.0.0.1:8087:8082"
      - "127.0.0.1:8088:8083"

  # ---- sso: one login for the whole estate. Issues the JWTs every other
  # service on this box validates. The estate cookie (Domain=.b4rruf3t.com)
  # it sets is what "log in once, recognized everywhere" physically is.
  sso:
    build: ../../minibank/sso-service
    restart: unless-stopped
    depends_on:
      minibank-control:
        condition: service_healthy
    environment:
      SSO_PORT: "8090"
      SSO_ISSUER: https://auth.b4rruf3t.com
      # The sso database brings itself up on the control plane: ADMIN_URL is
      # any existing database on the server (the bootstrap creates sso if it
      # is missing), the real URL is where the schema then lives.
      SSO_ADMIN_URL: jdbc:postgresql://minibank-control:5432/minibank
      SSO_DB_URL: jdbc:postgresql://minibank-control:5432/sso
      SSO_DB_USER: minibank
      SSO_DB_PASS: minibank
      # persisted keypair: survives rebuilds, or every deploy is a logout
      SSO_KEY_FILE: /keys/sso-rsa.key
      JAVA_TOOL_OPTIONS: "-Xmx96m"
    volumes:
      - sso_keys:/keys

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../web/portal:/srv/landing:ro
      - caddy_data:/data
    depends_on: [desk, gex-api, observatory, minibank, sso]

volumes:
  sso_keys:
  pgdata:
  caddy_data:
  deskdata:
  obsdata:
  bank_shard0:
  bank_shard1:
  bank_control:
