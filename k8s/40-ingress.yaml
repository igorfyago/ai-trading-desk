apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: desk
  namespace: ai-trading-desk
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt   # TLS required for WebRTC mic
spec:
  rules:
    - host: desk.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: desk
                port: { number: 80 }
  tls:
    - hosts: [desk.example.com]
      secretName: desk-tls
