# Template only — create the real one imperatively so secrets never land in git:
#   kubectl -n ai-trading-desk create secret generic desk-secrets \
#     --from-literal=OPENAI_API_KEY=sk-... \
#     --from-literal=LANGSMITH_API_KEY=lsv2_... \
#     --from-literal=DATABASE_URL=postgres://options:PASS@postgres.options-flow.svc:5432/options
apiVersion: v1
kind: Secret
metadata:
  name: desk-secrets
  namespace: ai-trading-desk
type: Opaque
stringData:
  OPENAI_API_KEY: REPLACE_ME
  LANGSMITH_API_KEY: ""
  DATABASE_URL: ""
