<!DOCTYPE html>
<html lang="en" style="color-scheme: dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Trading Desk · talk to the agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
<link rel="stylesheet" href="/static/style.css?v=10">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="brand">
      <h1>AI TRADING <span>DESK</span></h1>
      <p>Marcus reads the tape live.<br>Type, or press the mic and talk.</p>
    </div>
    <div class="section-label">🎙 Your desk analyst</div>
    <nav id="persona-list"></nav>
    <div id="theme-dots"></div>
    <footer>
      <a href="https://github.com/igorfyago/ai-trading-desk" target="_blank">GitHub ↗</a>
      <span>paper desk · marked to the live tape</span>
    </footer>
  </aside>

  <main id="chat-pane">
    <header id="chat-header">
      <div>
        <div id="current-name">Market Brief</div>
        <div id="current-desc"></div>
      </div>
      <div id="spy-chip" title="market feed"></div>
      <div id="score-chip" title="net P&L: realized + open"></div>
      <div id="voice-state"></div>
    </header>
    <div id="dock" hidden>
      <div id="dock-head">
        <span id="dock-status"></span>
        <span id="dock-title">–</span>
        <span id="dock-note"></span>
        <span id="dock-pnl"></span>
        <span class="dock-btns">
          <button id="dock-pop" title="Pop out: floats above every tab and app">⧉</button>
          <button id="dock-min" title="Collapse to a pill">▾</button>
        </span>
      </div>
      <div id="dock-body"><div id="dock-chart"></div></div>
    </div>
    <div id="log"></div>
    <div id="composer">
      <button id="mic" title="Talk to this agent">🎙</button>
      <input id="input" placeholder="Ask the agent…" autocomplete="off" enterkeyhint="send">
      <button id="send">Send</button>
    </div>
  </main>
</div>
<script src="/static/themes.js?v=4"></script>
<script src="/static/vendor/lightweight-charts.standalone.production.js?v=520"></script>
<script src="/static/desk-chart.js?v=16"></script>
<script src="/static/app.js?v=15"></script>
</body>
</html>
