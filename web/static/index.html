<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Trading Desk — talk to the agents</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="brand">
      <h1>AI TRADING <span>DESK</span></h1>
      <p>Six agents, one conversation.<br>Type to any of them — or press the mic and talk.</p>
    </div>
    <div class="section-label">Text agents — the ladder</div>
    <nav id="text-agents"></nav>
    <div class="section-label">Voice-native agents</div>
    <nav id="voice-personas"></nav>
    <footer>
      <a href="https://github.com/igorfyago/ai-trading-desk" target="_blank">GitHub ↗</a>
      <span>demo data · not financial advice</span>
    </footer>
  </aside>

  <main id="chat-pane">
    <header id="chat-header">
      <div>
        <div id="current-name">Market Brief</div>
        <div id="current-desc"></div>
      </div>
      <div id="voice-state"></div>
    </header>
    <div id="log"></div>
    <div id="composer">
      <button id="mic" title="Talk to this agent">🎙</button>
      <input id="input" placeholder="Ask the agent…" autocomplete="off">
      <button id="send">Send</button>
    </div>
  </main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
