# The full desk in production: the REAL options-flow-analytics pipeline
# (Rust collector -> Postgres -> Node API/dashboard) running 24/7, and the
# AI agents (ai-trading-desk web) reading the SAME live Postgres.
#
# Layout on the host (EC2): both repos cloned side by side —
#   ~/apps/options-flow-analytics
#   ~/apps/ai-trading-desk        <- run compose from this repo's deploy/
#
#   cd ~/apps/ai-trading-desk/deploy
#   cp .env.example .env          # fill OPENAI_API_KEY etc. (or pull from SSM)
#   docker compose -f docker-compose.aws.yml up -d --build

name: trading-desk

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: options
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: options
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../options-flow-analytics/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U options"]
      interval: 10s
      retries: 5

  collector:
    build:
      context: ../../options-flow-analytics
      dockerfile: collector/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://options:${POSTGRES_PASSWORD}@postgres:5432/options
      TICKERS: ${TICKERS:-SPY,QQQ}
      INTERVAL_SECS: ${INTERVAL_SECS:-30}
      PROVIDER: ${PROVIDER:-cboe}          # real delayed market data, no key needed
      RETENTION_DAYS: ${RETENTION_DAYS:-30}

  gex-api:
    build:
      context: ../../options-flow-analytics
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://options:${POSTGRES_PASSWORD}@postgres:5432/options
    ports:
      - "127.0.0.1:3000:3000"              # GEX dashboard (proxied by caddy)

  desk:
    build: ..
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set in .env}
      XAI_API_KEY: ${XAI_API_KEY:-}
      TV_WEBHOOK_TOKEN: ${TV_WEBHOOK_TOKEN:-}
      OPENAI_WEBHOOK_SECRET: ${OPENAI_WEBHOOK_SECRET:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-ai-trading-desk-prod}
      # live quotes feed: real-time IEX with Alpaca keys, labeled keyless
      # fallbacks without (yahoo -> cboe 15m -> DB snapshot)
      ALPACA_KEY_ID: ${ALPACA_KEY_ID:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      WATCH_SYMBOLS: ${WATCH_SYMBOLS:-SPY,QQQ,IWM}
      X_LIST_HANDLES: ${X_LIST_HANDLES:-}
      # the agents query the LIVE dealer-positioning DB, not the demo SQLite:
      DATABASE_URL: postgres://options:${POSTGRES_PASSWORD}@postgres:5432/options
    volumes:
      - deskdata:/app/data                 # trades log, custom personas, TA
                                           # signals survive rebuilds
    ports:
      - "127.0.0.1:8000:8000"              # agents app (proxied by caddy)

  observatory:
    build: ../../agent-observatory        # clone side-by-side like options-flow
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set in .env}
      OPENAI_MODEL: ${OBSERVATORY_MODEL:-gpt-4o-mini}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_PROJECT: agent-observatory
    ports:
      - "127.0.0.1:8321:8321"             # live agent-DAG demo (proxied by caddy)

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../web/landing:/srv/landing:ro
      - caddy_data:/data
    depends_on: [desk, gex-api, observatory]

volumes:
  pgdata:
  caddy_data:
  deskdata:
