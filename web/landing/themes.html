<!DOCTYPE html>
<html lang="en" style="color-scheme: dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pick the desk's skin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎛</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; }
  body { background:#0b0c0f; color:#e6e8ee; font:14px/1.6 "Inter",system-ui,sans-serif;
         padding:28px 4% 80px; -webkit-font-smoothing:antialiased; }
  .top { display:flex; align-items:center; gap:18px; flex-wrap:wrap; margin-bottom:26px; }
  .top h1 { font-size:17px; font-weight:600; letter-spacing:-.01em; }
  .top p { color:#8b93a4; font-size:12.5px; }
  select { background:#16181d; color:#e6e8ee; border:1px solid #2a2d35; border-radius:8px;
           padding:8px 12px; font:inherit; font-size:13.5px; margin-left:auto; }
  .hint { color:#8b93a4; font-size:12px; font-family:"IBM Plex Mono",monospace; }

  /* ---- every skin styles the SAME shell markup via these variables ---- */
  .shell {
    background:var(--s-bg); color:var(--s-text); border:1px solid var(--s-line);
    border-radius:14px; overflow:hidden; display:flex; min-height:430px;
    font-family:var(--s-font); font-size:13.5px;
  }
  .shell .side { width:198px; min-width:198px; background:var(--s-side);
                 border-right:1px solid var(--s-line); padding:16px 12px; display:flex;
                 flex-direction:column; gap:2px; }
  .shell .brand { font-weight:600; font-size:13.5px; margin-bottom:14px; letter-spacing:-.01em; }
  .shell .brand i { color:var(--s-accent); font-style:normal; }
  .shell .grp { color:var(--s-dim); font-size:9.5px; text-transform:uppercase;
                letter-spacing:.12em; margin:12px 2px 4px; font-family:"IBM Plex Mono",monospace; }
  .shell .nv { padding:6px 9px; border-radius:var(--s-navr); color:var(--s-dim); font-size:12.5px; }
  .shell .nv.on { background:var(--s-navbg); color:var(--s-navon); font-weight:500; }
  .shell .mainc { flex:1; padding:18px 20px; display:flex; flex-direction:column; gap:14px; min-width:0; }
  .shell .hd { display:flex; align-items:center; gap:10px; }
  .shell .hd h2 { font-size:15.5px; font-weight:600; letter-spacing:-.015em; }
  .shell .pill { font-size:10.5px; padding:3px 9px; border-radius:999px; color:var(--s-accent);
                 border:1px solid var(--s-accentline); background:var(--s-accentwash);
                 font-family:"IBM Plex Mono",monospace; }
  .shell .btn { margin-left:auto; background:var(--s-btnbg); color:var(--s-btntext);
                border:1px solid var(--s-btnline); border-radius:var(--s-btnr);
                padding:6px 14px; font-size:12.5px; font-weight:500; font-family:inherit; cursor:pointer; }
  .shell .trow { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .shell .tile { background:var(--s-card); border:1px solid var(--s-line);
                 border-radius:var(--s-cardr); padding:11px 13px; }
  .shell .tile .k { color:var(--s-dim); font-size:10px; text-transform:uppercase;
                    letter-spacing:.08em; font-family:"IBM Plex Mono",monospace; }
  .shell .tile .v { font-size:17px; font-weight:500; margin-top:3px;
                    font-family:"IBM Plex Mono",monospace; font-variant-numeric:tabular-nums; }
  .shell .tile .v.neg { color:var(--s-red); }
  .shell .duo { display:grid; grid-template-columns:1.5fr 1fr; gap:10px; flex:1; min-height:0; }
  .shell .card { background:var(--s-card); border:1px solid var(--s-line);
                 border-radius:var(--s-cardr); padding:14px; }
  .shell .card h4 { color:var(--s-dim); font-size:10px; text-transform:uppercase;
                    letter-spacing:.1em; margin-bottom:10px; font-family:"IBM Plex Mono",monospace; }
  .shell svg { width:100%; }
  .shell .bub { background:var(--s-bub); border:1px solid var(--s-line);
                border-radius:var(--s-cardr); padding:9px 12px; font-size:12.5px; margin-bottom:8px; }
  .shell .bub .who { color:var(--s-accent); font-size:9.5px; text-transform:uppercase;
                     letter-spacing:.1em; margin-bottom:3px; font-family:"IBM Plex Mono",monospace; }

  /* ---------------------------- SKIN: shadcn ---------------------------- */
  .skin-shadcn {
    --s-font:"Geist","Inter",system-ui,sans-serif;
    --s-bg:#09090b; --s-side:#09090b; --s-card:#101012; --s-bub:#18181b;
    --s-line:#232326; --s-text:#fafafa; --s-dim:#a1a1aa;
    --s-accent:#fafafa; --s-accentline:#3f3f46; --s-accentwash:rgba(255,255,255,.05);
    --s-navbg:#1c1c1f; --s-navon:#fafafa; --s-navr:8px;
    --s-btnbg:#fafafa; --s-btntext:#09090b; --s-btnline:transparent; --s-btnr:8px;
    --s-cardr:10px; --s-red:#f87171; --s-green:#4ade80;
  }
  /* ---------------------------- SKIN: gallery (current) ----------------- */
  .skin-gallery {
    --s-font:"Inter",system-ui,sans-serif;
    --s-bg:#13151b; --s-side:#13151b; --s-card:rgba(255,255,255,.04); --s-bub:rgba(255,255,255,.07);
    --s-line:rgba(255,255,255,.09); --s-text:#eceef4; --s-dim:#9ba3b2;
    --s-accent:#7c8aff; --s-accentline:rgba(124,138,255,.4); --s-accentwash:rgba(124,138,255,.08);
    --s-navbg:transparent; --s-navon:#7c8aff; --s-navr:6px;
    --s-btnbg:transparent; --s-btntext:#eceef4; --s-btnline:rgba(255,255,255,.16); --s-btnr:8px;
    --s-cardr:8px; --s-red:#f4657f; --s-green:#3ecf8e;
  }
  /* ---------------------------- SKIN: daisy dark ------------------------ */
  .skin-daisy {
    --s-font:"Inter",system-ui,sans-serif;
    --s-bg:#1d232a; --s-side:#191e24; --s-card:#191e24; --s-bub:#15191e;
    --s-line:rgba(255,255,255,.06); --s-text:#eceff4; --s-dim:#9fa9b8;
    --s-accent:#605dff; --s-accentline:#605dff; --s-accentwash:rgba(96,93,255,.14);
    --s-navbg:rgba(96,93,255,.16); --s-navon:#a5a3ff; --s-navr:10px;
    --s-btnbg:#605dff; --s-btntext:#fff; --s-btnline:transparent; --s-btnr:10px;
    --s-cardr:14px; --s-red:#ff6f70; --s-green:#00d390;
  }
  /* ---------------------------- SKIN: saas slate ------------------------ */
  .skin-saas {
    --s-font:"Inter",system-ui,sans-serif;
    --s-bg:#0f172a; --s-side:#111c33; --s-card:#16213b; --s-bub:#1c2947;
    --s-line:#26334f; --s-text:#e6ecf7; --s-dim:#8fa0bd;
    --s-accent:#3b82f6; --s-accentline:#2f5eb8; --s-accentwash:rgba(59,130,246,.12);
    --s-navbg:rgba(59,130,246,.14); --s-navon:#8ab5ff; --s-navr:8px;
    --s-btnbg:#2563eb; --s-btntext:#fff; --s-btnline:transparent; --s-btnr:8px;
    --s-cardr:10px; --s-red:#fb7185; --s-green:#34d399;
  }

  #stage { margin-bottom:40px; }
  #stage .shell { min-height:520px; }
  .gridwrap { display:grid; grid-template-columns:repeat(auto-fit,minmax(460px,1fr)); gap:18px; }
  .cell h3 { font-size:12.5px; color:#8b93a4; margin-bottom:8px; font-weight:500;
             font-family:"IBM Plex Mono",monospace; }
  .cell .shell { min-height:400px; zoom:.82; cursor:pointer; }
  .cell.picked h3 { color:#e6e8ee; }
</style>
</head>
<body>
  <div class="top">
    <div>
      <h1>Pick the desk's skin</h1>
      <p>Same shell, four design systems. The combo box re-skins the big stage; the grid keeps them side by side. Click a mini to stage it.</p>
    </div>
    <select id="picker" aria-label="skin">
      <option value="skin-shadcn">shadcn / Vercel · zinc, white primary, Geist</option>
      <option value="skin-gallery">dark gallery · current, indigo hairlines</option>
      <option value="skin-daisy">daisyUI dark · rounder, filled primary</option>
      <option value="skin-saas">SaaS slate · Preline/Flowbite blue</option>
    </select>
    <span class="hint" id="picked-label"></span>
  </div>

  <div id="stage"></div>
  <div class="gridwrap" id="grid"></div>

<template id="shell-t">
  <div class="shell">
    <div class="side">
      <div class="brand">B4RRU<i>F3T</i></div>
      <div class="grp">Finance</div>
      <div class="nv on">Dashboard</div>
      <div class="nv">Trading Desk</div>
      <div class="nv">GEX Dashboard</div>
      <div class="grp">Voice agency</div>
      <div class="nv">Voice Kit</div>
      <div class="nv">Agency Demos</div>
      <div class="grp">Under the hood</div>
      <div class="nv">Agent Atlas</div>
    </div>
    <div class="mainc">
      <div class="hd">
        <h2>Dashboard</h2>
        <span class="pill">QQQ · live</span>
        <button class="btn">Ask Marcus</button>
      </div>
      <div class="trow">
        <div class="tile"><div class="k">spot</div><div class="v">708.82</div></div>
        <div class="tile"><div class="k">net gex</div><div class="v neg">-2.71B</div></div>
        <div class="tile"><div class="k">atm iv</div><div class="v">24.9%</div></div>
        <div class="tile"><div class="k">vix</div><div class="v">16.1</div></div>
      </div>
      <div class="duo">
        <div class="card">
          <h4>Desk analyst · runtime graph</h4>
          <svg viewBox="0 0 430 150">
            <g stroke-width="1.2" fill="none">
              <path d="M78,30 C100,30 100,30 122,30" class="e"/>
              <path d="M78,30 C100,30 100,74 122,74" class="e"/>
              <path d="M194,30 C216,30 216,52 238,52" class="e"/>
              <path d="M194,74 C216,74 216,52 238,52" class="e"/>
              <path d="M310,52 C330,52 330,52 350,52" class="e"/>
            </g>
            <g class="nodes">
              <rect x="6" y="16" width="72" height="28" rx="14" class="port"/>
              <rect x="122" y="16" width="72" height="28" rx="6" class="node"/>
              <rect x="122" y="60" width="72" height="28" rx="6" class="node"/>
              <rect x="238" y="38" width="72" height="28" rx="6" class="node"/>
              <rect x="350" y="38" width="72" height="28" rx="14" class="port"/>
            </g>
            <g font-family="IBM Plex Mono, monospace" font-size="9.5" text-anchor="middle" class="labels">
              <text x="42" y="34">start</text>
              <text x="158" y="34">long_gamma</text>
              <text x="158" y="78">short_gamma</text>
              <text x="274" y="56">synthesize</text>
              <text x="386" y="56">end</text>
            </g>
          </svg>
        </div>
        <div class="card">
          <h4>Trading desk</h4>
          <div class="bub"><div class="who">Marcus · voice</div>
            QQQ's a forced-sell tape under the tipping point at 716. Buy the 708 puts, sell the 705s, out above 716.</div>
          <div class="bub"><div class="who">You</div>any news on that?</div>
        </div>
      </div>
    </div>
  </div>
</template>

<style>
  .shell svg .node { fill:var(--s-card); stroke:var(--s-line); }
  .shell svg .port { fill:var(--s-accentwash); stroke:var(--s-accent); }
  .shell svg .e { stroke:var(--s-dim); opacity:.55; }
  .shell svg .labels text { fill:var(--s-text); }
  .shell svg .labels text:first-child, .shell svg .labels text:last-child { fill:var(--s-accent); }
</style>

<script>
  const SKINS = [
    ["skin-shadcn", "shadcn / Vercel"],
    ["skin-gallery", "dark gallery (current)"],
    ["skin-daisy", "daisyUI dark"],
    ["skin-saas", "SaaS slate"],
  ];
  const t = document.getElementById("shell-t");
  const stage = document.getElementById("stage");
  const grid = document.getElementById("grid");

  function mount(skin, into) {
    const el = t.content.cloneNode(true).firstElementChild;
    el.classList.add(skin);
    into.appendChild(el);
    return el;
  }
  for (const [skin, label] of SKINS) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.id = "cell-" + skin;
    cell.innerHTML = `<h3>${label}</h3>`;
    grid.appendChild(cell);
    mount(skin, cell);
    cell.addEventListener("click", () => setSkin(skin));
  }
  function setSkin(skin) {
    stage.innerHTML = "";
    mount(skin, stage);
    document.getElementById("picker").value = skin;
    document.getElementById("picked-label").textContent = "staged: " + skin.replace("skin-", "");
    document.querySelectorAll(".cell").forEach(c =>
      c.classList.toggle("picked", c.id === "cell-" + skin));
  }
  document.getElementById("picker").addEventListener("change", (e) => setSkin(e.target.value));
  setSkin("skin-shadcn");   // his lean — first look
</script>
</body>
</html>
